name: CI

on:
  pull_request:
  push:
    branches: [ main, work ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Build collector
        run: dotnet build collector/ChromebookCollector.sln
      - name: Test collector
        run: dotnet test collector/ChromebookCollector.sln --no-build
      - name: Package extension
        run: bash extension/tools/pack.sh
