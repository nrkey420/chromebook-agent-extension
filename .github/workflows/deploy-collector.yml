name: deploy-collector
on:
  push:
    branches: [ main ]
jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '8.0.x' }
      - run: dotnet test collector/ChromebookCollector.sln
      - run: dotnet publish collector/src/ChromeCollector.FunctionApp/ChromeCollector.FunctionApp.csproj -c Release -o publish
