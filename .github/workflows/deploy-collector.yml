name: Deploy Collector

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'

permissions:
  contents: read
  id-token: write

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: |
          if ls *.sln >/dev/null 2>&1; then
            dotnet restore *.sln
          else
            dotnet restore
          fi

      - name: Build
        run: |
          if ls *.sln >/dev/null 2>&1; then
            dotnet build *.sln --configuration Release --no-restore
          else
            dotnet build --configuration Release --no-restore
          fi

      - name: Test
        run: |
          if ls *.sln >/dev/null 2>&1; then
            dotnet test *.sln --configuration Release --no-build --verbosity normal
          else
            dotnet test --configuration Release --no-build --verbosity normal
          fi

      - name: Publish Function App
        run: dotnet publish --configuration Release --output ./publish

      - name: Azure Login (OIDC)
        if: ${{ secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '' && secrets.AZURE_SUBSCRIPTION_ID != '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Function App (OIDC)
        if: ${{ secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '' && secrets.AZURE_SUBSCRIPTION_ID != '' }}
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: ./publish

      - name: Deploy Function App (Publish Profile fallback)
        if: ${{ !(secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '' && secrets.AZURE_SUBSCRIPTION_ID != '') }}
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: ./publish
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}

      - name: Apply Function App settings (OIDC)
        if: ${{ secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '' && secrets.AZURE_SUBSCRIPTION_ID != '' }}
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az functionapp config appsettings set \
              --name "${{ secrets.AZURE_FUNCTIONAPP_NAME }}" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --settings \
                HMAC_KEYS__KEY1="${{ secrets.HMAC_KEYS__KEY1 }}" \
                DCE_ENDPOINT="${{ secrets.DCE_ENDPOINT }}" \
                DCR_IMMUTABLE_ID="${{ secrets.DCR_IMMUTABLE_ID }}" \
                DCR_STREAM_NAME="${{ secrets.DCR_STREAM_NAME }}"

      - name: Apply Function App settings (Publish Profile fallback)
        if: ${{ !(secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '' && secrets.AZURE_SUBSCRIPTION_ID != '') }}
        uses: Azure/appservice-settings@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          app-settings-json: |
            [
              { "name": "HMAC_KEYS__KEY1", "value": "${{ secrets.HMAC_KEYS__KEY1 }}", "slotSetting": false },
              { "name": "DCE_ENDPOINT", "value": "${{ secrets.DCE_ENDPOINT }}", "slotSetting": false },
              { "name": "DCR_IMMUTABLE_ID", "value": "${{ secrets.DCR_IMMUTABLE_ID }}", "slotSetting": false },
              { "name": "DCR_STREAM_NAME", "value": "${{ secrets.DCR_STREAM_NAME }}", "slotSetting": false }
            ]
