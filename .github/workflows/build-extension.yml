name: build-extension
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cd extension && bash tools/pack.sh
      - uses: actions/upload-artifact@v4
        with:
          name: extension-package
          path: extension/dist/*.zip
